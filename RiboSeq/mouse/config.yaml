envmodules:
  R: R/4.4.0
  samtools: samtools/1.9
  fastx_toolkit: fastx_toolkit/0.0.14
  bowtie2: bowtie2/2.3.5
  STAR: STAR/2.7.11b
  cutadapt: cutadapt/3.5
  chip-seq: chip-seq/1.5.5
  bedtools: bedtools/2.28.0
  UMI-tools: UMI-tools/1.0.0git
  pipeline: pipeline/0.3.2
  rpfTools: rpfTools/1.2.0
  fastqc: fastqc/0.12.1
  trimgalore: TrimGalore/0.6.10
  UCSC: ucsc-tools/dec-10-2019
  DeepTools: deeptools/3.5.6/



work_dir: '/path/to/your/project/' # don't forget the last '/'
prefix: 'NovaSeq'


# Default >> for LIMS
trimgalore: '--quality 24 --phred33 --length 30 --fastqc'
umi_whitelist: '--extract-method string --bc-pattern NNNNNNNNCCCCC --3prime --log2stderr'
umi_extract : '--extract-method string --bc-pattern NNNNNNNNCCCCC --3prime --filter-cell-barcode --error-correct-cell --log2stderr'
umi_dedup : '--method=directional --per-cell --read-length'
consume: {
  "PF":"28 37",
  "PD":"45 70",
  "PT":"23 62",
  "P3":"75 100"
  } # value + 2 (2nt are trimmed after this step)
fastx_toolkit: '-Q33 -q 24 -p 90 -v'


# Reads mapping to the following references in that order:
refs: [mouse_rRNA, human_rRNA, mouse_tRNA, mouse_cDNA, mouse_genome]

# STAR
STAR_refs_path: {
  "mouse_rRNA": "/data/databases/mouse/star/Mmusculus.GRCm39.111/all_rRNA_PreRibo/",
  "human_rRNA": "/data/databases/human/star/Hsapiens.GRCh38.111/all_rRNA_PreRibo/",
  "mouse_tRNA": "/data/databases/mouse/star/Mmusculus.GRCm39.111/all_tRNA/",
  "mouse_cDNA": "/data/databases/mouse/star/Mmusculus.GRCm39.111/cDNA/",
  "mouse_genome": "/data/databases/mouse/star/Mmusculus.GRCm39.111/"
}

# Consider changing the value of '--outSAMmultNmax' to allow multimapping
STAR_params: 
  basic_params: &basic_params "--seedSearchStartLmax 28 --outSAMmultNmax 1 --outSAMtype BAM SortedByCoordinate Unsorted \
    --limitBAMsortRAM 15000000000 --outReadsUnmapped Fastx"
  other_params: &other_params "--seedSearchStartLmax 28 --outSAMmultNmax 20 --outSAMtype BAM SortedByCoordinate Unsorted \
    --limitBAMsortRAM 15000000000 --outReadsUnmapped Fastx"
  genome_params: &genome_params "--seedSearchStartLmax 28 --outSAMmultNmax 1 --outSAMtype BAM SortedByCoordinate Unsorted \
    --limitBAMsortRAM 15000000000 --outReadsUnmapped Fastx \
    --alignSJDBoverhangMin 1 --alignIntronMax 1000000 --outFilterType BySJout --alignSJoverhangMin 8 \
    --sjdbGTFfile /data/databases/mouse/gtf/Mmusculus.GRCm39.111.sorted.gtf"

# currently: STAR mapping to mouse_rRNA, human_rRNA, mouse_tRNA,
# mouse_cDNA after mouse_tRNA (results in mapping_data/)
# mouse_genome after mouse_tRNA (results in mapping_data/)
# mouse_genome after mouse_tRNA WITH SPECIFIC RSEM PARAMETERS (results in RSEM/STAR/)
STAR_refs_params: {
  "mouse_rRNA": *basic_params,
  "human_rRNA": *basic_params,
  "mouse_tRNA": *basic_params,
  "mouse_cDNA": *basic_params,
  "mouse_genome": *genome_params
}


# RSEM
ref_version: 'Mmusculus.GRCm39.111'
ref_path: '/data/databases/mouse/'
ref_genome: '/data/databases/mouse/fasta/Mmusculus.GRCm39.111.dna.ensembl.fa'
ref_GTF: '/data/databases/mouse/gtf/Mmusculus.GRCm39.111.sorted.gtf'
RSEM_path: '/data/databases/RSEM/Mmusculus.GRCm39.111/'

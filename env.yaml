name: myenv

channels:
 - conda-forge
 - bioconda
 - defaults

dependencies:
 - python >= 3.12.11
 - pip >= 25.2
 - R >= 4.4.0
 - samtools = 1.9
 - fastx_toolkit = 0.0.14
 - STAR = 2.7.11b
 - cutadapt = 3.5
 - bedtools = 2.28.0
 - umi_tools
 - fastqc
 - trim-galore = 0.6.10
 - seqtk
 - r-ggplot2
 - r-gridextra
 - r-cowplot
 - bioconductor-deseq2
 - r-rcolorbrewer
 - r-ggpubr
 - r-stringr
 - pip:
   - snakemake == 8.14.0
   - pandas
